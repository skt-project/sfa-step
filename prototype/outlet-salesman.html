<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store & Salesman Evaluate — STEP</title>
<link rel="stylesheet" href="assets/css/step.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebarMount"></div>
  <main class="main">
    <div id="topbarMount"></div>
    <div class="content">

      <div class="h1">Store & Salesman Evaluate</div>
      <div class="text-sm ink-faint" style="margin-top:4px;" id="ossSubtitle">Store 360, Salesman 360, dan mapping store-salesman — semua perubahan tercatat di audit log.</div>

      <div class="card mt-20">
        <div class="tabs" id="moduleTabs" style="padding:0 20px;">
          <button class="active" data-tab="outlets">Store</button>
          <button data-tab="salesmen">Salesman</button>
          <button data-tab="mapping">Mapping Store-Salesman</button>
        </div>
        <div class="widget-body">
          <div class="topbar-search" style="max-width:320px; margin-bottom:14px;"><span>🔎</span><input id="listSearch" placeholder="Cari..."></div>
          <div id="listBody"></div>
        </div>
      </div>

    </div>
  </main>
</div>
<div id="bottomNavMount"></div>

<script src="assets/js/step.js"></script>
<script>
STEP.renderShell('outlet-salesman');
STEP.guardPage('outlet-salesman', function(scope) {
const D = STEP.DATA;
const groupSalesmen = STEP.salesmenInCurrentGroup();
let tab = 'outlets';
let q = '';

function outletsTable(){
  const rows = D.outlets.filter(o => !q || o.name.toLowerCase().includes(q) || o.code.toLowerCase().includes(q));
  return `<table class="table"><thead><tr><th>Store</th><th>Kode</th><th>Tier</th><th>Last Visit</th><th>Sell-In Growth</th><th>Achievement</th><th></th></tr></thead><tbody>
    ${rows.map(o => `<tr>
      <td><strong>${o.name}</strong>${o.isNew?' <span class="pill pill-info">Baru</span>':''}</td>
      <td class="ink-faint">${o.code}</td>
      <td>${STEP.tierBadge(o.tier)}</td>
      <td>${o.lastVisitDays} hari lalu ${o.lastVisitDays>30?'<span class="pill pill-danger" style="margin-left:6px;">Gap</span>':''}</td>
      <td style="color:${o.sellInGrowthPct>=0?'var(--success)':'var(--danger)'}; font-weight:700;">${o.sellInGrowthPct>=0?'+':''}${o.sellInGrowthPct}%</td>
      <td class="num">${o.achievementPct}%</td>
      <td><a class="btn btn-outline btn-sm" href="outlet-360.html?id=${o.id}">Lihat 360 →</a></td>
    </tr>`).join('')}
  </tbody></table>`;
}
function salesmenTable(){
  const rows = groupSalesmen.filter(s => !q || s.name.toLowerCase().includes(q) || s.code.toLowerCase().includes(q));
  return `<table class="table"><thead><tr><th>Salesman</th><th>Kode</th><th>Achievement</th><th>Route Compliance</th><th>Coverage</th><th></th></tr></thead><tbody>
    ${rows.map(s => `<tr>
      <td><strong>${s.name}</strong></td>
      <td class="ink-faint">${s.code}</td>
      <td class="num" style="font-weight:700; color:${s.achievementPct>=80?'var(--success)':'var(--warning)'}">${s.achievementPct}%</td>
      <td class="num">${s.routeCompliancePct}%</td>
      <td class="num">${s.coveragePct}%</td>
      <td><a class="btn btn-outline btn-sm" href="salesman-360.html?id=${s.id}">Lihat 360 →</a></td>
    </tr>`).join('')}
  </tbody></table>`;
}
function mappingTable(){
  const rows = D.outlets.map((o,i) => ({ outlet:o, salesman: groupSalesmen[i % groupSalesmen.length] }));
  const filtered = rows.filter(r => !q || r.outlet.name.toLowerCase().includes(q) || r.salesman.name.toLowerCase().includes(q));
  return `<table class="table"><thead><tr><th>Store</th><th>Salesman Terpetakan</th><th>Status</th></tr></thead><tbody>
    ${filtered.map(r => `<tr><td>${r.outlet.name}</td><td>${r.salesman.name}</td><td>${STEP.statusPill('approved')}</td></tr>`).join('')}
  </tbody></table>
  <div class="text-sm ink-faint mt-14">Perubahan mapping tercatat di audit log yang sama dengan override tier — lihat <a href="administration.html" style="color:var(--primary-600); font-weight:600;">Administrasi → Audit Log</a>.</div>`;
}

function render(){
  document.getElementById('listBody').innerHTML = tab==='outlets' ? outletsTable() : tab==='salesmen' ? salesmenTable() : mappingTable();
}
document.querySelectorAll('#moduleTabs button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('#moduleTabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
  tab = b.dataset.tab; render();
}));
document.getElementById('listSearch').addEventListener('input', e => { q = e.target.value.toLowerCase(); render(); });
render();
}); // end guardPage
</script>
</body>
</html>
