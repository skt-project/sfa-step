<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Opportunity — STEP</title>
<link rel="stylesheet" href="assets/css/step.css">
<style>
  /* ── Opportunity score badge ── */
  .opp-score{ display:inline-flex; align-items:center; gap:6px; font-weight:800; font-size:13px; padding:4px 12px; border-radius:999px; }
  .opp-high{ background:var(--success-bg); color:var(--success); }
  .opp-mid{ background:var(--warning-bg); color:var(--warning); }
  .opp-low{ background:var(--danger-bg); color:var(--danger); }

  /* ── Recommendation class badge ── */
  .rec-badge{ display:inline-flex; align-items:center; gap:5px; font-weight:700; font-size:11.5px; padding:3px 10px; border-radius:999px; }
  .rec-a{ background:var(--success-bg); color:var(--success); }
  .rec-b{ background:var(--warning-bg); color:var(--warning); }
  .rec-c{ background:var(--danger-bg); color:var(--danger); }

  /* ── Sub-page nav ── */
  .so-subnav{ display:flex; gap:6px; overflow-x:auto; padding:16px 20px 0; border-bottom:1px solid var(--line); background:var(--surface); position:sticky; top:var(--topbar-h); z-index:15; }
  .so-subnav button{ flex:0 0 auto; padding:10px 16px; border:none; background:none; font-size:13px; font-weight:600; color:var(--ink-soft); cursor:pointer; border-bottom:3px solid transparent; transition:color .15s, border-color .15s; white-space:nowrap; }
  .so-subnav button.active{ color:var(--primary-700); border-bottom-color:var(--primary-500); }
  .so-subnav button:hover:not(.active){ color:var(--ink); }

  /* ── Store list rows (clickable) ── */
  .store-row{ cursor:pointer; }
  .store-row:hover td{ background:var(--soft-white); }

  /* ── Proposal preview ── */
  .proposal-preview{ border:1px solid var(--line); border-radius:var(--radius-md); padding:24px; background:var(--soft-white); font-size:13px; line-height:1.7; }
  .proposal-preview .prop-header{ display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  .proposal-preview .prop-logo{ font-size:22px; font-weight:800; color:var(--primary-700); }
  .proposal-preview .prop-meta{ text-align:right; color:var(--ink-soft); }
  .proposal-preview .prop-meta strong{ color:var(--ink); display:block; font-size:15px; }
  .prop-table{ width:100%; border-collapse:collapse; margin-top:12px; }
  .prop-table th{ background:var(--primary-500); color:#fff; padding:9px 12px; font-size:12px; text-align:left; }
  .prop-table td{ padding:9px 12px; border-bottom:1px solid var(--line); font-size:12.5px; }
  .prop-table tr:last-child td{ border-bottom:none; }
  .prop-summary{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-top:20px; }
  .prop-sig{ border-top:1px solid var(--ink-faint); margin-top:30px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  .prop-sig div{ padding-top:8px; font-size:11.5px; color:var(--ink-soft); text-align:center; }

  /* ── Back button ── */
  .back-link{ display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--ink-soft); cursor:pointer; margin-bottom:16px; }
  .back-link:hover{ color:var(--primary-600); }

  /* ── SKU table (Page 4) ── */
  .sku-trend-up{ color:var(--success); font-weight:700; }
  .sku-trend-dn{ color:var(--danger); font-weight:700; }
  .sku-trend-fl{ color:var(--ink-faint); font-weight:600; }

  /* ── Proposal history ── */
  .prop-hist-row{ padding:12px 0; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
  .prop-hist-row:last-child{ border-bottom:none; }

  @media(max-width:767px){
    /* sub-nav: drop sticky positioning so it doesn't expand the document scrollWidth */
    .so-subnav{ position:relative; max-width:100vw; width:100%; }
    /* proposal layout */
    .proposal-preview .prop-header{ grid-template-columns:1fr; }
    .prop-summary, .prop-sig{ grid-template-columns:1fr; }
    /* proposal table — horizontal scroll on mobile */
    .proposal-preview{ overflow-x:auto; }
    .prop-table{ min-width:480px; }
    /* row-2-1 override if step.css breakpoint doesn't cover this context */
    .row-2-1{ grid-template-columns:1fr !important; }
    /* clip overflow at the content container so any wide sub-element (proposal table,
       performance table) can scroll within its own wrapper without pushing the whole page */
    #soContent{ overflow-x:hidden; }
    .widget-body{ overflow-x:auto; }
  }
</style>
</head>
<body>

<div class="app-shell">
  <div id="sidebarMount"></div>
  <main class="main">
    <div id="topbarMount"></div>

    <div class="so-subnav" id="soSubnav">
      <button data-page="dashboard" class="active">📊 Store Dashboard</button>
      <button data-page="performance">🏆 Store Performance</button>
      <button data-page="detail" style="display:none;">🏬 Store Detail</button>
      <button data-page="sku" style="display:none;">📦 SKU Analysis</button>
      <button data-page="recommendations">💡 Recommendations</button>
      <button data-page="proposal">📄 Offer Proposal</button>
    </div>

    <div class="content" id="soContent"></div>
  </main>
</div>
<div id="bottomNavMount"></div>

/* ══════════ UTILITY ══════════ */
function oppBadge(score) {
  const cls = score >= 70 ? 'opp-high' : score >= 45 ? 'opp-mid' : 'opp-low';
  const icon = score >= 70 ? '🟢' : score >= 45 ? '🟡' : '🔴';
  return `<span class="opp-score ${cls}">${icon} ${score}</span>`;
}
function recBadge(score, trend) {
  const cls = (score >= 70 && trend === 'Increasing') ? 'rec-a' : score >= 45 ? 'rec-b' : 'rec-c';
  const label = (score >= 70 && trend === 'Increasing') ? 'Recommended' : score >= 45 ? 'Potential' : 'Monitor';
  return `<span class="rec-badge ${cls}">${label}</span>`;
}
function trendIcon(g) { return g > 5 ? `<span class="sku-trend-up">▲ ${g.toFixed(1)}%</span>` : g < -5 ? `<span class="sku-trend-dn">▼ ${Math.abs(g).toFixed(1)}%</span>` : `<span class="sku-trend-fl">→ ${g.toFixed(1)}%</span>`; }

function showPage(page) {
  activePage = page;
  document.querySelectorAll('.so-subnav button').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  document.querySelectorAll('.so-subnav button[data-page="detail"], .so-subnav button[data-page="sku"]').forEach(b => {
    b.style.display = (page === 'detail' || page === 'sku') ? '' : 'none';

}

function renderSku() {
  const s = currentStore;
  if (!s) return;
  document.getElementById('soContent').innerHTML = `
    <div class="back-link" onclick="showPage('detail')">← Kembali ke Store Detail: ${s.name}</div>
    <div class="flex items-center justify-between" style="flex-wrap:wrap;gap:10px;margin-bottom:18px;">
      <div class="h1">SKU Analysis — ${s.name}</div>
      <button class="btn btn-primary" onclick="showPage('recommendations')">💡 Lihat Recommendations →</button>
    </div>
    <div class="card">
      <div class="widget-head"><div class="h3">SKU Demand Breakdown</div><span class="text-sm ink-faint">30 hari terakhir</span></div>
      <div class="widget-body">
        <table class="table">
          <thead><tr>
            <th>SKU Code</th><th>Nama Produk</th><th>Brand</th><th>Kategori</th>
            <th class="num">Total Qty</th><th class="num">Frekuensi (hari)</th>
            <th class="num">Avg/Mgg</th><th class="num">Avg/Bln</th>
            <th>Growth</th><th>Opportunity</th><th>Last Demand</th>
          </tr></thead>
          <tbody>
            ${MOCK_SKUS.map(k=>`
              <tr>
                <td class="ink-faint" style="font-size:12px;">${k.code}</td>
                <td><strong>${k.name}</strong></td>
                <td><span class="pill pill-info">${k.brand}</span></td>
                <td>${k.category}</td>
                <td class="num">${k.qty}</td>
                <td class="num">${k.freq}</td>
                <td class="num">${k.weeklyAvg}</td>
                <td class="num">${k.monthlyAvg}</td>
                <td>${trendIcon(k.growth)}</td>
                <td>${oppBadge(k.score)}</td>
                <td>${k.lastDate}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderRecommendations() {
  const s = currentStore;
  document.getElementById('soContent').innerHTML = `
    <div class="flex items-center justify-between" style="flex-wrap:wrap;gap:10px;margin-bottom:18px;">
      <div>
        <div class="h1">Opportunity Recommendations</div>
        <div class="text-sm ink-faint mt-8">${s ? `Store: ${s.name}` : 'Semua store — pilih store untuk proposal spesifik'}</div>
      </div>
      <button class="btn btn-primary" id="createProposalBtn" ${s?'':'disabled'} onclick="showPage('proposal')">📄 Buat Proposal →</button>
    </div>

    <div class="card card-pad mt-8" style="background:var(--primary-50);border:1px solid var(--primary-100);">
      <div class="text-sm" style="color:var(--primary-700);">🤖 <strong>Scoring otomatis</strong> berdasarkan demand quantity, frekuensi, dan growth rate — diperbarui setiap hari. Ubah bobot scoring di <a href="administration.html" style="color:var(--primary-600);">Administrasi → Konfigurasi Recommendation</a>.</div>
    </div>

    <div class="grid-3 mt-20">
      ${['Recommended','Potential','Monitor'].map((cls,ci)=>{
        const items = MOCK_SKUS.filter(k=>{ const s=k.score; return ci===0?(s>=70&&k.trend==='Increasing'):ci===1?(s>=45&&!(s>=70&&k.trend==='Increasing')):s<45; });
        const badgeCls = ['rec-a','rec-b','rec-c'][ci];
        return `<div class="card card-pad">
          <div class="flex items-center justify-between"><div class="h3">${['💚 Recommended','🟡 Potential','🔴 Monitor'][ci]}</div><span class="pill ${['pill-success','pill-warning','pill-danger'][ci]}">${items.length} SKU</span></div>
          <div style="margin-top:12px;display:flex;flex-direction:column;gap:10px;">
            ${items.map(k=>`
              <div class="card card-pad" style="padding:12px;cursor:pointer;" onclick="toggleSku('${k.code}')">
                <div class="flex items-center justify-between gap-8">
                  <div style="min-width:0;flex:1;"><div style="font-weight:700;font-size:13px;">${k.name.substring(0,28)}...</div><div class="text-sm ink-faint">${k.code} · ${k.brand}</div></div>
                  <input type="checkbox" data-sku="${k.code}" ${selectedSkus.has(k.code)?'checked':''} onclick="event.stopPropagation();toggleSku('${k.code}')">
                </div>
                <div class="flex gap-8 mt-8 flex-wrap">
                  <span class="text-sm ink-soft">Avg/Bln: <strong>${k.monthlyAvg}</strong></span>
                  <span class="text-sm">${trendIcon(k.growth)}</span>
                  <span class="text-sm ink-soft">Saran: <strong>${k.suggested} pcs</strong></span>
                </div>
              </div>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="card card-pad mt-20" style="background:var(--soft-white);">
      <div class="flex items-center justify-between">
        <div><strong>${selectedSkus.size} SKU dipilih</strong> untuk proposal</div>
        <button class="btn btn-primary" ${selectedSkus.size>0&&s?'':'disabled'} onclick="showPage('proposal')">📄 Buat Proposal untuk ${s?s.name:'store terpilih'}</button>
      </div>
    </div>`;
}

function toggleSku(code) {
  selectedSkus.has(code) ? selectedSkus.delete(code) : selectedSkus.add(code);
  renderRecommendations();
}

function renderProposal() {
  const s = currentStore;
  const items = selectedSkus.size > 0
    ? MOCK_SKUS.filter(k => selectedSkus.has(k.code))
    : MOCK_SKUS.slice(0,4);
  const totalQty = items.reduce((a,k)=>a+k.suggested,0);
  const propDate = new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  const propNo = 'PROP/DST171/202607/0004';

  document.getElementById('soContent').innerHTML = `
    <div class="flex items-center justify-between" style="flex-wrap:wrap;gap:10px;margin-bottom:18px;">
      <div class="h1">Offer Proposal</div>
      <div class="flex gap-10">
        <button class="btn btn-outline" onclick="window.print()">🖨️ Print</button>
        <button class="btn btn-primary" onclick="STEP.toast('Proposal ${propNo} berhasil disimpan dan di-export','✅')">💾 Simpan & Export PDF</button>
      </div>
    </div>

    <div class="row-2-1">
      <div>
        <div class="card card-pad proposal-preview" id="proposalDoc">
          <div class="prop-header">
            <div>
              <div class="prop-logo">📦 STEP Distribution</div>
              <div class="text-sm ink-soft mt-8">Jl. Distribusi Nusantara No. 1<br>Jakarta Selatan 12345<br>Tel: 021-8888-0000</div>
            </div>
            <div class="prop-meta">
              <strong>PENAWARAN PRODUK</strong>
              <div>No: <strong>${propNo}</strong></div>
              <div>Tgl: ${propDate}</div>
              <div style="color:var(--success);font-weight:700;">Valid s/d: 31 Juli 2026</div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;padding:14px;background:var(--soft-white);border-radius:var(--radius-md);">
            <div>
              <div class="text-sm ink-faint">Kepada Yth:</div>
              <div style="font-weight:700;">${s ? s.name : 'Beauty Store Pilihan'}</div>
              <div class="text-sm ink-soft">${s ? s.code : '—'} · ${s ? s.region : '—'}</div>
            </div>
            <div>
              <div class="text-sm ink-faint">Salesman:</div>
              <div style="font-weight:700;">${s ? s.salesman : '—'}</div>
            </div>
          </div>

          <table class="prop-table">
            <thead><tr>
              <th>#</th><th>Kode SKU</th><th>Nama Produk</th>
              <th class="num">Hist. Demand</th><th class="num">Avg/Mgg</th>
              <th class="num">Avg/Bln</th><th class="num">Rekomendasi</th>
            </tr></thead>
            <tbody>
              ${items.map((k,i)=>`<tr>
                <td>${i+1}</td>
                <td style="font-size:11.5px;color:var(--ink-faint);">${k.code}</td>
                <td><strong>${k.name}</strong></td>
                <td class="num">${k.qty}</td>
                <td class="num">${k.weeklyAvg}</td>
                <td class="num">${k.monthlyAvg}</td>
                <td class="num"><strong>${k.suggested}</strong></td>
              </tr>`).join('')}
            </tbody>
          </table>

          <div class="prop-summary mt-20">
            <div class="card card-pad"><div class="kpi-label">Total SKU</div><div class="kpi-value">${items.length}</div></div>
            <div class="card card-pad"><div class="kpi-label">Total Qty</div><div class="kpi-value num">${totalQty}</div></div>
            <div class="card card-pad"><div class="kpi-label">Status</div><div class="kpi-value">${STEP.statusPill('approved')}</div></div>
          </div>

          <div class="prop-sig">
            <div>Dibuat oleh<br><strong>Distributor Admin</strong></div>
            <div>Disetujui<br><strong>${s?s.salesman:'—'}</strong><br>___________________</div>
            <div>Pelanggan<br><strong>${s?s.name:'—'}</strong><br>___________________</div>
          </div>
        </div>
      </div>

      <div>
        <div class="card card-pad">
          <div class="h3">Riwayat Proposal</div>
          <div class="mt-14">
            ${MOCK_PROPOSALS.map(p=>`
              <div class="prop-hist-row">
                <div>
                  <div style="font-weight:700;font-size:13px;">${p.no}</div>
                  <div class="text-sm ink-faint">${p.store} · ${p.date}</div>
                </div>
                <div class="flex gap-8 items-center">
                  <span class="pill ${p.status==='printed'?'pill-success':'pill-warning'}">${p.status==='printed'?'Printed':'Generated'}</span>
                  <button class="btn btn-outline btn-sm" onclick="STEP.toast('Mencetak ulang ${p.no}...','🖨️')">Reprint</button>
                </div>
              </div>`).join('')}
          </div>
        </div>

        <div class="card card-pad mt-20">
          <div class="h3">Catatan Proposal</div>
          <textarea class="input mt-10" rows="3" style="width:100%;" placeholder="Tambahkan catatan untuk proposal ini..."></textarea>
          <button class="btn btn-primary btn-sm w-full mt-10" onclick="STEP.toast('Catatan disimpan','💾')">Simpan Catatan</button>
        </div>
      </div>
    </div>`;
}

/* ══════════ MAIN ROUTER ══════════ */
function render() {
  if (activePage === 'dashboard') renderDashboard();
  else if (activePage === 'performance') renderPerformance();
  else if (activePage === 'detail') renderDetail();
  else if (activePage === 'sku') renderSku();
  else if (activePage === 'recommendations') renderRecommendations();
  else if (activePage === 'proposal') renderProposal();
}

function selectStore(code) {
  currentStore = MOCK_STORES.find(s => s.code === code);
  selectedSkus = new Set(MOCK_SKUS.filter(k=>k.score>=70&&k.trend==='Increasing').map(k=>k.code));
  document.querySelectorAll('.so-subnav button[data-page="detail"], .so-subnav button[data-page="sku"]').forEach(b => b.style.display = '');
  showPage('detail');
}

document.querySelectorAll('.so-subnav button').forEach(b => b.addEventListener('click', () => {
  if (b.dataset.page === 'detail' && !currentStore) { STEP.toast('Pilih store dari Store Performance terlebih dahulu','ℹ️'); return; }
  if (b.dataset.page === 'sku' && !currentStore) { STEP.toast('Pilih store dari Store Performance terlebih dahulu','ℹ️'); return; }
  showPage(b.dataset.page);
}));

render();
}); // end guardPage
</script>
</body>
</html>
