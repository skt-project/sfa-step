  { dist_code:'DST019', kode_toko:'STR00055', store_name:'Mini Market Pematang Siantar',   brand:'SKT', salesman:'Rani Safitri',   hari:null, frekuensi:null, minggu:null, source:'Basis' },
  { dist_code:'DST019', kode_toko:'STR00055', store_name:'Mini Market Pematang Siantar',   brand:'G2G', salesman:'Doni Kurniawan', hari:null, frekuensi:null, minggu:null, source:'Basis' },
];

let currentTab   = 'effective';
let selectedDist = '';
let deadlineOpen = true;
let deadlineDate = '2026-07-31';

/* ── Scope helper ──────────────────────────────────────────────────── */
function scopedRows() {
  let rows = EFF_PJP;
  if (role === 'distributor_admin') {
    rows = rows.filter(r => r.dist_code === STEP.ROLES['distributor_admin'].distributor_code);
  } else if (selectedDist) {
    rows = rows.filter(r => r.dist_code === selectedDist);
  }
  return rows;
}

/* ── Coverage summary ──────────────────────────────────────────────── */
function buildSummary(rows) {
  const stores     = new Set(rows.map(r => r.kode_toko));
  const pjpStores  = new Set(rows.filter(r => r.source==='PJP').map(r => r.kode_toko));
  const basStores  = [...stores].filter(s => !pjpStores.has(s));
  const pjpPct     = stores.size ? Math.round(pjpStores.size / stores.size * 100) : 0;
  return { total: stores.size, pjp: pjpStores.size, basis: basStores.length, pjpPct };
}

function renderSummaryCards(rows) {
  const s = buildSummary(rows);
  const wrap = document.getElementById('summaryRow');
  wrap.innerHTML = [
    { val: s.total, lbl: 'Total Toko (Basis DB)' },
    { val: s.pjp,   lbl: 'Toko dengan PJP' },
    { val: s.basis, lbl: 'Toko Basis Saja (belum ter-PJP)' },
    { val: s.pjpPct + '%', lbl: 'Coverage PJP' },
  ].map(m => `
    <div class="card card-pad">
      <div class="metric-mini">
        <div class="val">${m.val}</div>
        <div class="lbl">${m.lbl}</div>
        ${m.lbl==='Coverage PJP'?`<div class="coverage-bar"><div class="coverage-fill" style="width:${s.pjpPct}%"></div></div>`:''}
      </div>
    </div>`).join('');
}

/* ── Tab: Effective PJP ────────────────────────────────────────────── */
let lastSourceFilter = '';
let lastBrandFilter  = '';

function renderEffective() {
  const rows = scopedRows();
  if (!rows.length) return `<div class="empty-state"><div class="ic">📋</div><p>Tidak ada data PJP efektif untuk filter ini.</p></div>`;

  const search = document.getElementById('effSearch')?.value.toLowerCase() || '';
  let filtered = applyEffFilters(rows, search);

  /* Per-salesman summary */
  const bySmn = {};
  rows.filter(r=>r.source==='PJP').forEach(r => {
    if (!bySmn[r.salesman]) bySmn[r.salesman] = { stores: new Set(), rows: 0 };
    bySmn[r.salesman].stores.add(r.kode_toko);
    bySmn[r.salesman].rows++;
  });

  return `
    <!-- ── Penjelasan konsep PJP ── -->
    <div style="margin-bottom:18px; padding:14px 18px; background:var(--primary-50,#EEF2FF); border:1px solid var(--primary-200,#C7D2FE); border-radius:10px; font-size:var(--text-sm);">
      <strong style="color:var(--primary-700,#4338CA);">📖 Apa itu PJP?</strong>
      <div style="margin-top:8px; color:var(--ink-secondary); line-height:1.6;">
        <strong>PJP (Plan Journey Plan)</strong> = jadwal kunjungan salesman ke toko. Setiap baris PJP menjawab:
        <em>"Salesman A mengunjungi Toko X untuk brand SKT setiap <u>Hari Senin</u>, <u>4× sebulan</u>, di minggu <u>Ganjil + Genap</u>."</em><br>
        <div style="margin-top:8px; display:flex; gap:16px; flex-wrap:wrap;">
          <span><strong>F4+</strong> = lebih dari 4× sebulan (Tier S)</span>
          <span><strong>F4</strong> = 4× sebulan (semua minggu)</span>
          <span><strong>F2</strong> = 2× sebulan (Ganjil atau Genap)</span>
          <span><strong>F1</strong> = 1× sebulan</span>
        </div>
        <div style="margin-top:8px;">
          <span class="source-badge-pjp">PJP</span> = jadwal eksplisit dari file upload distributor &nbsp;|&nbsp;
          <span class="source-badge-basis">Basis</span> = toko sudah ada di Database Basis tapi belum di-PJP — salesman diketahui, hari/frekuensi belum.
          <strong>Goal: semua toko coverage 100% PJP.</strong>
        </div>
      </div>
    </div>

    <!-- ── Filter bar ── -->
    <div style="display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;">
      <div class="topbar-search" style="max-width:260px;"><span>🔎</span><input id="effSearch" placeholder="Cari toko / kode / salesman..." oninput="rerenderEffective()" value="${search}"></div>
      <select id="sourceFilter" style="padding:7px 12px; border:1px solid var(--border); border-radius:6px; font-size:var(--text-sm); background:var(--surface); color:var(--ink);" onchange="rerenderEffective()">
        <option value="">Semua Sumber</option>
        <option value="PJP"   ${lastSourceFilter==='PJP'  ?'selected':''}>PJP saja</option>
        <option value="Basis" ${lastSourceFilter==='Basis'?'selected':''}>Basis saja</option>
      </select>
      <select id="brandFilter" style="padding:7px 12px; border:1px solid var(--border); border-radius:6px; font-size:var(--text-sm); background:var(--surface); color:var(--ink);" onchange="rerenderEffective()">
        <option value="">Semua Brand</option>
        <option value="SKT" ${lastBrandFilter==='SKT'?'selected':''}>SKT (Skintific)</option>
        <option value="G2G" ${lastBrandFilter==='G2G'?'selected':''}>G2G (Glad2Glow)</option>
        <option value="TPH" ${lastBrandFilter==='TPH'?'selected':''}>TPH (Timephoria)</option>
      </select>
    </div>

    <!-- ── Salesman load summary ── -->
    <div style="margin-bottom:14px; padding:12px 16px; background:var(--soft-white); border-radius:8px;">
      <div style="font-size:var(--text-xs); font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-faint); margin-bottom:8px;">Beban Toko per Salesman (PJP)</div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        ${Object.entries(bySmn).map(([name, d]) => `
          <div style="padding:5px 12px; background:var(--surface); border:1px solid var(--border); border-radius:8px; font-size:var(--text-sm);">
            <span style="font-weight:600;">${name}</span>
            <span style="color:var(--ink-secondary); margin-left:6px;">🏪 ${d.stores.size} toko</span>
          </div>`).join('')}
      </div>
    </div>

    ${buildEffTable(filtered)}
    <div class="text-sm ink-faint mt-14">
      🟡 Baris kuning = sumber <strong>Basis</strong> — toko belum memiliki PJP eksplisit. Hari / Frekuensi / Minggu hanya diisi pada baris PJP.
    </div>`;
}

function applyEffFilters(rows, search) {
  let filtered = rows;
  if (search)           filtered = filtered.filter(r => r.kode_toko.toLowerCase().includes(search) || r.store_name.toLowerCase().includes(search) || (r.salesman||'').toLowerCase().includes(search));
  if (lastSourceFilter) filtered = filtered.filter(r => r.source === lastSourceFilter);
  if (lastBrandFilter)  filtered = filtered.filter(r => r.brand  === lastBrandFilter);
  return filtered;
}

function rerenderEffective() {
  lastSourceFilter = document.getElementById('sourceFilter')?.value || '';
  lastBrandFilter  = document.getElementById('brandFilter')?.value  || '';
  const rows   = scopedRows();
  const search = document.getElementById('effSearch')?.value.toLowerCase() || '';
  const filtered = applyEffFilters(rows, search);
  const tbody = document.querySelector('#effTable tbody');
  if (tbody) tbody.innerHTML = effRows(filtered);
}

function buildEffTable(rows) {
  return `<table class="table" id="effTable"><thead><tr>
    <th>Kode Toko</th><th>Nama Toko</th><th>Brand</th><th>Salesman</th>
    <th>Hari</th><th>Frekuensi</th><th>Minggu</th><th>Sumber</th>
  </tr></thead><tbody>${effRows(rows)}</tbody></table>`;
}

function effRows(rows) {
  if (!rows.length) return `<tr><td colspan="8" style="text-align:center; color:var(--ink-faint); padding:20px;">Tidak ada data.</td></tr>`;
  return rows.map(r => `<tr style="${r.source==='Basis'?'background:#FFF9E6':''}" >
    <td class="ink-faint" style="font-family:monospace;">${r.kode_toko}</td>
    <td>${r.store_name}</td>
    <td>${r.brand}</td>
    <td>${r.salesman||'—'}</td>
    <td>${r.hari||'—'}</td>
    <td>${r.frekuensi||'—'}</td>
    <td>${r.minggu||'—'}</td>
    <td><span class="${r.source==='PJP'?'source-badge-pjp':'source-badge-basis'}">${r.source}</span></td>
  </tr>`).join('');
}

/* ── Tab: Upload / Perbarui PJP ────────────────────────────────────── */
function renderUpload() {
  const isOpen = deadlineOpen;
  return `
    <div class="flex items-center gap-12" style="margin-bottom:18px;">
      <span>Status Input Period:</span>
      <span class="deadline-chip ${isOpen?'chip-open':'chip-closed'}">${isOpen?'🟢 Terbuka':'🔴 Ditutup'} — deadline ${deadlineDate}</span>
    </div>
    ${!isOpen ? `<div class="card card-pad" style="background:#FEF2F2; border:1px solid #FCA5A5; margin-bottom:16px;">
      <strong>⛔ Periode Input Ditutup</strong><br>
      <span class="text-sm ink-faint">Deadline <strong>${deadlineDate}</strong> telah lewat. Upload baru tidak dapat dilakukan sampai periode berikutnya dibuka di tab Konfigurasi.</span>
    </div>` : ''}
    <div class="card card-pad" style="${!isOpen?'opacity:.5; pointer-events:none;':''}">
      <div class="h3">Upload File PJP</div>
      <p class="text-sm ink-faint">Upload file Excel PJP menggunakan template resmi. Data lama untuk scope yang dipilih akan dihapus secara atomik dan diganti dengan data baru.</p>
      <div style="margin-top:16px;">
        <label class="text-sm" style="font-weight:600;">Scope Update:</label>
        <div style="display:flex; gap:12px; margin-top:8px;">
          <label style="display:flex; align-items:center; gap:6px; cursor:pointer;"><input type="radio" name="scope" value="dist" checked> Seluruh Distributor</label>
          <label style="display:flex; align-items:center; gap:6px; cursor:pointer;"><input type="radio" name="scope" value="sal"> Per Salesman</label>
        </div>
      </div>
      <div style="margin-top:16px; border:2px dashed var(--border); border-radius:8px; padding:32px; text-align:center;" id="dropZone"
        onclick="STEP.toast('Upload file Excel di sini (produksi mengarahkan ke Streamlit v2 untuk eksekusi)','📁')">
        <div style="font-size:2rem;">📎</div>
        <div class="text-sm ink-faint mt-8">Klik atau seret file Excel (.xlsx) ke sini</div>
        <div class="text-xs ink-faint" style="margin-top:4px;">Gunakan template dari Download Template</div>
      </div>
      <div style="margin-top:16px; display:flex; gap:10px;">
        <button class="btn btn-outline btn-sm" onclick="STEP.toast('Mengunduh template PJP kosong...','📥')">📥 Download Template</button>
        <button class="btn btn-primary btn-sm" onclick="STEP.toast('Di produksi, proses upload dikirim ke API Streamlit v2 untuk validasi &amp; atomic commit','⚙️')">🔄 Proses Upload (simulasi)</button>
      </div>
    </div>
    <div class="text-sm ink-faint mt-14">
      Catatan arsitektur: upload PJP diorkestrasi oleh Streamlit app <code>salesman_pjp_v2</code> menggunakan BigQuery scripted transaction (BEGIN … EXCEPTION WHEN ERROR THEN RAISE … END) untuk atomisitas penuh — jika INSERT gagal, DELETE sebelumnya otomatis di-rollback.
    </div>`;
}

/* ── Tab: Konfigurasi Deadline ─────────────────────────────────────── */
function renderConfig() {
  if (role !== 'ho_admin') return `<div class="empty-state"><div class="ic">🔒</div><p>Konfigurasi deadline hanya dapat diubah oleh <strong>HO Admin</strong>.</p></div>`;
  return `
    <div class="h3" style="margin-bottom:16px;">Konfigurasi Deadline Input PJP</div>
    <div class="card card-pad" style="max-width:480px;">
      <div style="display:flex; flex-direction:column; gap:14px;">
        <div>
          <label class="text-sm" style="font-weight:600;">Deadline Input PJP (YYYY-MM-DD)</label>
          <input id="deadlineInput" type="date" value="${deadlineDate}" style="margin-top:6px; padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:var(--text-sm); background:var(--surface); color:var(--ink); width:100%; box-sizing:border-box;">
        </div>
        <div>
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="checkbox" id="deadlineOpenCheck" ${deadlineOpen?'checked':''}>
            <span class="text-sm">Periode input sedang terbuka</span>
          </label>
          <div class="text-xs ink-faint" style="margin-top:4px;">Hilangkan centang untuk menutup input tanpa mengubah tanggal deadline.</div>
        </div>
        <button class="btn btn-primary btn-sm" style="align-self:flex-start;" onclick="saveDeadlineConfig()">Simpan Konfigurasi</button>
      </div>
    </div>
    <div class="text-sm ink-faint mt-14">
      Di produksi, nilai ini disimpan di <code>sfa_step.app_config</code> (BigQuery) dengan key <code>pjp_input_deadline</code> dan dibaca oleh Streamlit v2 via <code>st.secrets["pjp_input_deadline"]</code>. HO Admin dapat mengubah setiap bulan tanpa deploy ulang.
    </div>`;
}

function saveDeadlineConfig() {
  deadlineDate = document.getElementById('deadlineInput').value;
  deadlineOpen = document.getElementById('deadlineOpenCheck').checked;
  renderTabBody();
  STEP.toast('Konfigurasi deadline disimpan', '✅');
}

/* ── Render orchestration ──────────────────────────────────────────── */
function renderTabBody() {
  const rows = scopedRows();
  renderSummaryCards(rows);
  const body = document.getElementById('pjpTabBody');
  if (currentTab === 'effective') body.innerHTML = renderEffective();
  if (currentTab === 'upload')    body.innerHTML = renderUpload();
  if (currentTab === 'config')    body.innerHTML = renderConfig();
}

function initPage() {
  /* Distributor selector for ho_admin */
  const distSel = document.getElementById('distSelector');
  if (role === 'distributor_admin') {
    document.getElementById('distSelectorWrap').style.display = 'none';
  } else {
    DISTS.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.code; opt.textContent = d.name;
      distSel.appendChild(opt);
    });
    distSel.addEventListener('change', e => { selectedDist = e.target.value; renderTabBody(); });
  }

  /* Deadline display */
  const deadlineEl = document.getElementById('deadlineDisplay');
  deadlineEl.innerHTML = `<span class="deadline-chip ${deadlineOpen?'chip-open':'chip-closed'}">${deadlineOpen?'🟢':'🔴'} ${deadlineDate}</span>`;

  /* Action bar */
  document.getElementById('actionBar').innerHTML = `
    <a href="master-data-salesman.html" class="btn btn-outline btn-sm">👤 Kelola Salesman</a>`;

  /* Tabs */
  document.querySelectorAll('#pjpTabs button').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('#pjpTabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentTab = b.dataset.tab;
    renderTabBody();
  }));

  renderTabBody();
}

initPage();
}); // end guardPage
</script>
</body>
</html>
