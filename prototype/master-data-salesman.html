<style>
  /* ── Status indicators ── */
  .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .dot-active   { background:#22C55E; }
  .dot-inactive { background:#94A3B8; }

  /* ── Filter bar ── */
  .filter-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .filter-bar select { padding:7px 12px; border:1px solid var(--border); border-radius:6px; font-size:var(--text-sm); background:var(--surface); color:var(--ink); }
  .filter-bar .search-wrap { flex:1; min-width:200px; max-width:280px; }

  /* ── Summary chips ── */
  .summary-chips { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .summary-chip { display:flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:var(--text-sm); font-weight:600; background:var(--surface-2); color:var(--ink-secondary); border:1px solid var(--border); }
  .chip-active   { background:#F0FDF4; color:#166534; border-color:#BBF7D0; }
  .chip-inactive { background:#F8FAFC; color:#64748B; border-color:#CBD5E1; }
  .chip-total    { background:var(--primary-50,#EEF2FF); color:var(--primary-700,#4338CA); border-color:var(--primary-200,#C7D2FE); }

  /* ── Table extras ── */
  .table td .store-badge { font-size:11px; background:var(--soft-white); color:var(--ink-secondary); padding:2px 7px; border-radius:10px; }
  .action-group { display:flex; gap:6px; white-space:nowrap; }

  /* ── Pagination ── */
  .pager { display:flex; align-items:center; gap:8px; padding:14px 20px; border-top:1px solid var(--border); font-size:var(--text-sm); }
  .pager .page-info { color:var(--ink-secondary); flex:1; }
  .pager-btn { padding:5px 11px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--ink); cursor:pointer; font-size:var(--text-sm); }
  .pager-btn:disabled { opacity:.4; cursor:not-allowed; }
  .pager-btn.active { background:var(--primary-600); color:#fff; border-color:var(--primary-600); }

  /* ── Form grid ── */
  .form-grid   { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-full   { grid-column:1/-1; }
  .form-group  { display:flex; flex-direction:column; gap:5px; }
  .form-group label { font-size:var(--text-sm); font-weight:600; color:var(--ink-secondary); }
  .form-group input, .form-group select, .form-group textarea {
    padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:var(--text-sm);
    background:var(--surface); color:var(--ink); width:100%; box-sizing:border-box; font-family:inherit;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline:none; border-color:var(--primary-600); box-shadow:0 0 0 3px rgba(99,102,241,.12);
  }
  .form-group input:disabled { opacity:.5; background:var(--soft-white); cursor:not-allowed; }
  .form-divider { border:none; border-top:1px solid var(--border); margin:14px 0; grid-column:1/-1; }
  .form-section { font-size:var(--text-xs); font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-faint); margin-bottom:4px; grid-column:1/-1; }

  /* ── Detail grid ── */
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .detail-item { display:flex; flex-direction:column; gap:3px; }
  .detail-label { font-size:var(--text-xs); font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-faint); }
  .detail-value { font-size:var(--text-sm); color:var(--ink); font-weight:500; }

  /* ── Export btn ── */
  .btn-export { display:inline-flex; align-items:center; gap:6px; }
</style>

/* ══════════════════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════════════════ */
let currentTab  = 'list';
let searchQ     = '';
let filterType  = '';
let filterStatus= '';
let filterRegion= '';
let filterDist  = '';
let page        = 1;
const PAGE_SIZE = 10;

/* ══════════════════════════════════════════════════════════════════
   SCOPE FILTER (distributor_admin sees only their distributor)
   ══════════════════════════════════════════════════════════════════ */
function scopedSalesmen() {
  let rows = SALESMEN;
  if (role === 'distributor_admin') {
    const myDist = STEP.ROLES['distributor_admin'].distributor_code;
    rows = rows.filter(s => s.distributor_code === myDist);
  }
  if (searchQ)      rows = rows.filter(s => s.name.toLowerCase().includes(searchQ) || s.id.toLowerCase().includes(searchQ) || (s.employee_id||'').toLowerCase().includes(searchQ) || (s.route_code||'').toLowerCase().includes(searchQ));
  if (filterType)   rows = rows.filter(s => s.type === filterType);
  if (filterStatus) rows = rows.filter(s => s.status === filterStatus);
  if (filterRegion) rows = rows.filter(s => s.region === filterRegion);
  if (filterDist)   rows = rows.filter(s => s.distributor_code === filterDist);
  return rows;
}

function uniqueRegions() { return [...new Set(SALESMEN.map(s => s.region))].sort(); }

/* ══════════════════════════════════════════════════════════════════
   TAB ROUTING
   ══════════════════════════════════════════════════════════════════ */
function renderTabContent() {
  const body = document.getElementById('tabContent');
  if (currentTab === 'list')    body.innerHTML = renderList();
  if (currentTab === 'mapping') body.innerHTML = renderMapping();
  if (currentTab === 'audit')   body.innerHTML = renderAudit();
  wireListActions();
}

/* ══════════════════════════════════════════════════════════════════
   SUMMARY CHIPS
   ══════════════════════════════════════════════════════════════════ */
function summaryHtml(rows) {
  const active   = rows.filter(s => s.status === 'active').length;
  const inactive = rows.filter(s => s.status === 'inactive').length;
  return `<div class="summary-chips">
    <span class="summary-chip chip-total">👥 Total: ${rows.length}</span>
    <span class="summary-chip chip-active">🟢 Aktif: ${active}</span>
    <span class="summary-chip chip-inactive">⚫ Non-aktif: ${inactive}</span>
    ${rows.length < SALESMEN.length ? `<span class="summary-chip" style="background:#FFF9E6; color:#92400E; border-color:#FCD34D;">🔍 Filter aktif — ${SALESMEN.length - rows.length} tersembunyi</span>` : ''}
  </div>`;
}

/* ══════════════════════════════════════════════════════════════════
   FILTER BAR
   ══════════════════════════════════════════════════════════════════ */

/* ══════════════════════════════════════════════════════════════════
   LIST TAB
   ══════════════════════════════════════════════════════════════════ */
function renderList() {
  const all  = scopedSalesmen();
  const maxP = Math.max(1, Math.ceil(all.length / PAGE_SIZE));
  if (page > maxP) page = maxP;
  const rows = all.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

  return `${filterBarHtml()}${summaryHtml(all)}
    ${rows.length === 0
      ? `<div class="empty-state"><div class="ic">👤</div><p>Tidak ada salesman ditemukan.</p></div>`
      : `<table class="table">
          <thead><tr>
            <th>ID Salesman</th><th>Nama</th><th>Tipe</th>
            <th>Distributor</th><th>Area</th><th>SPV</th>
            <th>Toko</th><th>Status</th><th style="min-width:110px;"></th>
          </tr></thead>
          <tbody>${rows.map(s=>`<tr>
            <td><span style="font-family:monospace; font-size:12px; color:var(--ink-secondary);">${s.id}</span></td>
            <td><strong>${s.name}</strong><br><span style="font-size:11px; color:var(--ink-faint);">${s.employee_id}</span></td>
            <td><span class="pill pill-neutral">${s.type}</span></td>
            <td style="max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${s.distributor_name}">${s.distributor_name.replace('PT ','')}</td>
            <td>${s.area}</td>
            <td>${s.spv}</td>
            <td><span class="store-badge">🏪 ${s.store_count}</span></td>
            <td><span class="status-dot ${s.status==='active'?'dot-active':'dot-inactive'}"></span>${s.status==='active'?'Aktif':'Non-aktif'}</td>
            <td><div class="action-group">
              <button class="btn btn-outline btn-sm action-detail" data-id="${s.id}" title="Lihat detail">🔍</button>
              <button class="btn btn-outline btn-sm action-edit"   data-id="${s.id}" title="Edit">✏️</button>
              ${s.status==='active'?`<button class="btn btn-sm action-deact" data-id="${s.id}" title="Non-aktifkan" style="background:#FEF2F2; color:#DC2626; border:1px solid #FECACA;">⊘</button>`:''}
            </div></td>
          </tr>`).join('')}</tbody>
        </table>
        ${pagerHtml(page, maxP, all.length)}`
    }`;
}

function pagerHtml(cur, max, total) {
  if (max <= 1) return `<div class="pager"><span class="page-info">${total} salesman</span></div>`;
  const pages = [];
  for (let i=1; i<=max; i++) {
    if (i===1 || i===max || Math.abs(i-cur)<=1) pages.push(i);
    else if (pages[pages.length-1]!=='…') pages.push('…');
  }
  return `<div class="pager">
    <span class="page-info">Halaman ${cur} dari ${max} (${total} salesman)</span>
    <button class="pager-btn" id="pgPrev" ${cur<=1?'disabled':''}>‹</button>
    ${pages.map(p=>p==='…'
      ? `<span style="padding:0 4px; color:var(--ink-faint);">…</span>`
      : `<button class="pager-btn ${p===cur?'active':''}" data-pg="${p}">${p}</button>`).join('')}
    <button class="pager-btn" id="pgNext" ${cur>=max?'disabled':''}>›</button>
  </div>`;
}

/* ══════════════════════════════════════════════════════════════════
   WIRE ACTIONS & EVENTS
   ══════════════════════════════════════════════════════════════════ */
function wireListActions() {
  // Filter events
  document.getElementById('listSearch')?.addEventListener('input',  e => { searchQ=e.target.value.toLowerCase(); page=1; renderTabContent(); });
  document.getElementById('typeFilter')?.addEventListener('change', e => { filterType=e.target.value; page=1; renderTabContent(); });
  document.getElementById('statusFilter')?.addEventListener('change',e => { filterStatus=e.target.value; page=1; renderTabContent(); });
  document.getElementById('regionFilter')?.addEventListener('change',e => { filterRegion=e.target.value; page=1; renderTabContent(); });
  document.getElementById('distFilter')?.addEventListener('change', e => { filterDist=e.target.value; page=1; renderTabContent(); });
  document.getElementById('clearFilters')?.addEventListener('click',() => { searchQ=filterType=filterStatus=filterRegion=filterDist=''; page=1; renderTabContent(); });

  // Pagination
  document.getElementById('pgPrev')?.addEventListener('click', () => { page--; renderTabContent(); });
  document.getElementById('pgNext')?.addEventListener('click', () => { page++; renderTabContent(); });
  document.querySelectorAll('[data-pg]').forEach(b => b.addEventListener('click', () => { page=+b.dataset.pg; renderTabContent(); }));

  // Row actions
  document.querySelectorAll('.action-detail').forEach(b => b.addEventListener('click', () => openDetail(b.dataset.id)));
  document.querySelectorAll('.action-edit').forEach(b => b.addEventListener('click', () => openEdit(b.dataset.id)));
  document.querySelectorAll('.action-deact').forEach(b => b.addEventListener('click', () => confirmDeact(b.dataset.id)));
}

function submitEdit(id) {
  const s    = find(id);
  const name = document.getElementById('eName').value.trim();
  const spv  = document.getElementById('eSpv').value.trim();
  const msg  = document.getElementById('editMsg');
  if (!name || !spv) { showMsg(msg,'error','Nama dan SPV wajib diisi.'); return; }
  const prev = s.name;
  s.name       = name;
  s.phone      = document.getElementById('ePhone').value.trim();
  s.email      = document.getElementById('eEmail').value.trim();
  s.spv        = spv;
  s.area_manager = document.getElementById('eAM').value.trim();
  s.area       = document.getElementById('eArea').value.trim();
  s.branch     = document.getElementById('eBranch').value.trim();
  s.route_code = document.getElementById('eRouteCode').value.trim();
  s.route_name = document.getElementById('eRouteName').value.trim();
  s.store_count= parseInt(document.getElementById('eStores').value)||0;
  s.notes      = document.getElementById('eNotes').value.trim();
  s.last_updated = new Date().toISOString().slice(0,10);
  AUDIT_LOG.unshift({ ts: now(), user: STEP.ROLES[role].name+' ('+role+')', action:'UPDATE', entity: s.name, detail:`Data salesman diperbarui${prev!==s.name?' (nama: '+prev+' → '+s.name+')':''}` });
  STEP.closeDrawer();
  renderTabContent();
  STEP.toast(`${s.name} berhasil diperbarui`, '✅');
}

          <div id="idPreview" style="font-family:monospace; font-size:var(--text-sm); padding:7px 12px; border-radius:6px; background:var(--soft-white); color:var(--ink-secondary);">— pilih tipe & distributor —</div>
        </div>
        <div class="form-group">
          <label>Employee ID</label>
          <input id="aEmpId" placeholder="EMP-xxxx (opsional)" maxlength="20">
        </div>

        <span class="form-section">Data Pribadi</span>
        <div class="form-group">
          <label>Nama Lengkap <span style="color:#DC2626">*</span></label>
          <input id="aName" maxlength="80" placeholder="Nama salesman">
        </div>
        <div class="form-group">
          <label>No. HP</label>
          <input id="aPhone" maxlength="25" placeholder="08xx-xxxx-xxxx">
        </div>
        <div class="form-group form-full">
          <label>Email</label>
          <input id="aEmail" type="email" maxlength="100" placeholder="nama@distributor.co.id">
        </div>

        <span class="form-section">Penempatan</span>
        <div class="form-group">
          <label>SPV <span style="color:#DC2626">*</span></label>
          <input id="aSpv" maxlength="80">
        </div>
        <div class="form-group">
          <label>Area Manager</label>
          <input id="aAM" maxlength="80">
        </div>
        <div class="form-group">
          <label>Area</label>
          <input id="aArea" maxlength="80">
        </div>
        <div class="form-group">
          <label>Branch</label>
          <input id="aBranch" maxlength="80">
        </div>

        <span class="form-section">Route</span>
        <div class="form-group">
          <label>Kode Route</label>
          <input id="aRouteCode" placeholder="JKS-RT-01" maxlength="30">
        </div>
        <div class="form-group">
          <label>Nama Route</label>
          <input id="aRouteName" maxlength="80">
        </div>
        <div class="form-group">
          <label>Tanggal Bergabung</label>
          <input id="aJoin" type="date" value="${new Date().toISOString().slice(0,10)}">
        </div>
        <div class="form-group form-full">
          <label>Catatan</label>
          <textarea id="aNotes" rows="2" placeholder="Opsional..."></textarea>
        </div>
      </div>
      <div id="addMsg" style="margin-top:10px; display:none;"></div>
      <div style="display:flex; gap:10px; margin-top:18px;">
        <button class="btn btn-primary" onclick="submitAdd()">➕ Tambah Salesman</button>
        <button class="btn btn-outline" onclick="STEP.closeDrawer()">Batal</button>
      </div>
    </div>`);
}

function previewId() {
  const dist = document.getElementById('aDist')?.value;
  const type = document.getElementById('aType')?.value;
  const el   = document.getElementById('idPreview');
  if (!el) return;
  if (!dist || !type) { el.textContent = '— pilih tipe & distributor —'; return; }
  const count = SALESMEN.filter(s => s.distributor_code===dist && s.type===type).length + 1;
  el.textContent = `${dist}-${type}-${String(count).padStart(3,'0')}  ← ID final dari server`;
}

function submitAdd() {
  const dist  = document.getElementById('aDist').value;
  const type  = document.getElementById('aType').value;
  const name  = document.getElementById('aName').value.trim();
  const spv   = document.getElementById('aSpv').value.trim();
  const msg   = document.getElementById('addMsg');
  if (!dist||!type||!name||!spv) { showMsg(msg,'error','Distributor, tipe, nama, dan SPV wajib diisi.'); return; }
  const count  = SALESMEN.filter(s => s.distributor_code===dist && s.type===type).length + 1;
  const newId  = `${dist}-${type}-${String(count).padStart(3,'0')}`;
  const dInfo  = DISTRIBUTORS.find(d=>d.code===dist);
  SALESMEN.push({
    id:newId, employee_id:document.getElementById('aEmpId').value.trim()||`EMP-XXXX`,
    name, type, brand: type==='GTI'?'Skintific':type==='MIX'?'Glad2Glow':'Timephoria',
    phone:document.getElementById('aPhone').value.trim(),
    email:document.getElementById('aEmail').value.trim(),
    distributor_code:dist, distributor_name:dInfo?.name||dist,
    region:dInfo?.region||'', area:document.getElementById('aArea').value.trim(),
    branch:document.getElementById('aBranch').value.trim(),
    spv, area_manager:document.getElementById('aAM').value.trim()||dInfo?.area_manager||'',
    route_code:document.getElementById('aRouteCode').value.trim(),
    route_name:document.getElementById('aRouteName').value.trim(),
    store_count:0, status:'active',
    join_date:document.getElementById('aJoin').value,
    last_updated:new Date().toISOString().slice(0,10),
    notes:document.getElementById('aNotes').value.trim(),
  });
  AUDIT_LOG.unshift({ ts:now(), user:STEP.ROLES[role].name+' ('+role+')', action:'INSERT', entity:name, detail:`Salesman baru (${type}) ditambahkan — ID: ${newId}` });
  STEP.closeDrawer();
  renderTabContent();
  STEP.toast(`${name} berhasil ditambahkan (${newId})`, '✅');
}

/* ══════════════════════════════════════════════════════════════════
   DEACTIVATE CONFIRM
   ══════════════════════════════════════════════════════════════════ */
function confirmDeact(id) {
  const s = find(id);
  STEP.openModal(`
    <div class="modal-head"><strong>Non-aktifkan Salesman</strong></div>
    <div class="modal-body">
      <p>Anda akan <strong>menonaktifkan</strong>:</p>
      <p style="margin:12px 0; padding:12px; background:var(--soft-white); border-radius:8px;">
        <strong>${s.name}</strong><br>
        <span style="font-family:monospace; font-size:12px; color:var(--ink-secondary);">${s.id} · ${s.employee_id}</span><br>
        <span style="font-size:12px; color:var(--ink-secondary);">${s.distributor_name} · ${s.area}</span>
      </p>
      <p class="text-sm ink-faint">Mapping akan diset <code>is_active = FALSE</code>. Data historis tidak dihapus dan tercatat di Audit Log.</p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="STEP.closeModal()">Batal</button>
      <button class="btn btn-primary" style="background:#DC2626; border-color:#DC2626;" onclick="doDeact('${s.id}')">Non-aktifkan</button>
    </div>`);
}

function doDeact(id) {
  const s = find(id);
  s.status = 'inactive';
  s.store_count = 0;
  s.route_code = '';
  s.route_name = '';
  s.last_updated = new Date().toISOString().slice(0,10);
  AUDIT_LOG.unshift({ ts:now(), user:STEP.ROLES[role].name+' ('+role+')', action:'DEACTIVATE', entity:s.name, detail:'Mapping dinonaktifkan (is_active = FALSE)' });
  STEP.closeModal();
  renderTabContent();
  STEP.toast(`${s.name} telah dinonaktifkan`, '⚠️');
}

/* ══════════════════════════════════════════════════════════════════
   EXPORT CSV
   ══════════════════════════════════════════════════════════════════ */
function exportCsv() {
  const rows = scopedSalesmen();
  const headers = ['ID Salesman','Employee ID','Nama','Tipe','No HP','Email','Distributor','Kode Distributor','Region','Area','Branch','Area Manager','SPV','Kode Route','Nama Route','Jumlah Toko','Status','Tanggal Bergabung','Terakhir Diperbarui','Catatan'];
  const lines = [headers.join(',')];
  rows.forEach(s => {
    lines.push([s.id,s.employee_id,s.name,s.type,s.phone,s.email,
      `"${s.distributor_name}"`,s.distributor_code,s.region,s.area,s.branch,
      s.area_manager,s.spv,s.route_code,`"${s.route_name}"`,s.store_count,s.status,
      s.join_date,s.last_updated,`"${s.notes}"`].join(','));
  });
  const blob = new Blob([lines.join('\n')], { type:'text/csv;charset=utf-8;' });
  const a    = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `master_salesman_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  STEP.toast(`${rows.length} baris diekspor ke CSV`, '⬇️');
}

/* ══════════════════════════════════════════════════════════════════
   UTILITIES
   ══════════════════════════════════════════════════════════════════ */
function showMsg(el, type, text) {
  el.style.display = '';
  el.className = type==='error' ? 'pill pill-danger' : 'pill pill-success';
  el.textContent = text;
}
function now() { return new Date().toISOString().slice(0,16).replace('T',' '); }

/* ══════════════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════════════ */
function init() {
  document.querySelectorAll('#mainTabs button').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('#mainTabs button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentTab = b.dataset.tab;
    page = 1;
    renderTabContent();
  }));
  document.getElementById('addSalesmanBtn').addEventListener('click', openAdd);
  document.getElementById('exportCsvBtn').addEventListener('click', exportCsv);
  renderTabContent();
}

init();

}); // end guardPage
</script>
</body>
</html>
